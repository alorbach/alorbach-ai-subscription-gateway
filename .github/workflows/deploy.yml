name: Release and deploy

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: alorbach-ai-subscription-gateway
      SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
      SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version (strip optional v-prefix)
        id: vars
        run: |
          ref="${GITHUB_REF_NAME}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        id: package
        run: |
          set -euo pipefail
          SLUG="${PLUGIN_SLUG}"
          VERSION="${{ steps.vars.outputs.version }}"
          BUILD_DIR="build"
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR/$SLUG"
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "$BUILD_DIR" \
            --exclude ".wordpress-org" \
            --exclude ".*" \
            --exclude "bin/" \
            --exclude "node_modules/" \
            --exclude "*.log" \
            --exclude "*.zip" \
            --exclude "composer.lock" \
            --exclude "package-lock.json" \
            --exclude "README.md" \
            ./ "$BUILD_DIR/$SLUG"/
          (cd "$BUILD_DIR" && zip -r "${SLUG}-${VERSION}.zip" "$SLUG")
          echo "zip_path=${PWD}/${BUILD_DIR}/${SLUG}-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Get commits since last tag
        id: commits
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          [ -z "$LOG" ] && LOG="- Initial release"
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes with AI
        id: ai_body
        env:
          AI_MODEL_KEY: ${{ secrets.AI_MODEL_KEY }}
        run: |
          INSTALL_STEPS="### Installation\n1. Download \`alorbach-ai-subscription-gateway-${{ steps.vars.outputs.version }}.zip\` from Assets below\n2. In WordPress Admin go to **Plugins → Add New → Upload Plugin**\n3. Upload the ZIP and activate\n4. Go to **AI Gateway → API Keys** to configure your provider credentials"
          if [ -z "${AI_MODEL_KEY}" ]; then
            {
              echo "body<<EOF"
              printf '%b\n' "$INSTALL_STEPS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg commits "${{ steps.commits.outputs.log }}" \
            --arg version "${{ github.ref_name }}" \
            '{
              model: "gpt-4o",
              messages: [
                {
                  role: "system",
                  content: "You are a technical writer creating GitHub release notes for a WordPress plugin called \"Alorbach AI Subscription Gateway\". Write concise, developer-friendly release notes in Markdown. Group changes under ### What'\''s New, ### Improvements, and ### Bug Fixes headers as appropriate. Omit headers with no items. Be factual and base content only on the provided commits."
                },
                {
                  role: "user",
                  content: ("Generate release notes for version " + $version + ".\n\nCommits:\n" + $commits)
                }
              ],
              max_tokens: 800,
              temperature: 0.3
            }')
          RESPONSE=$(curl -sf -X POST \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer ${AI_MODEL_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || RESPONSE=""
          BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null)
          if [ -z "$BODY" ]; then
            BODY="_AI release notes generation failed._"
          else
            BODY=$(printf '%s\n\n%b' "$BODY" "$INSTALL_STEPS")
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.zip_path }}
          generate_release_notes: false
          body: ${{ steps.ai_body.outputs.body }}

      - name: Skipping WP.org deploy (missing secrets)
        if: ${{ env.SVN_USERNAME == '' || env.SVN_PASSWORD == '' }}
        run: |
          echo "SVN secrets missing; skipping WordPress.org deploy"

      - name: WordPress Plugin Deploy
        if: ${{ env.SVN_USERNAME != '' && env.SVN_PASSWORD != '' }}
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ env.SVN_USERNAME }}
          SVN_PASSWORD: ${{ env.SVN_PASSWORD }}
          SLUG: ${{ env.PLUGIN_SLUG }}
          ASSETS_DIR: .wordpress-org
